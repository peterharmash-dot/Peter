<!DOCTYPE html>
<!--
  DOCTYPE говорит браузеру: "это современный HTML5 документ".
  Всегда пишется самой первой строкой.
-->
<html lang="ru">
<!--
  <html> — корневой элемент, внутри него лежит ВСЯ страница.
  lang="ru" подсказывает браузеру и поисковикам язык страницы.
-->

<head>
  <!--
    <head> — "техническая шапка". Тут НЕТ того, что видно на странице.
    Здесь живут настройки: кодировка, заголовок вкладки, подключение стилей.
  -->

  <meta charset="UTF-8">
  <!-- Кодировка UTF-8 — чтобы корректно отображались русские буквы и эмодзи. -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Это для телефонов: страница подстраивается под ширину экрана. -->

  <title>Peter — Design Engineer</title>
  <!-- Текст, который виден на вкладке браузера. -->

  <script src="https://cdn.tailwindcss.com"></script>
  <!--
    Так подключается Tailwind CSS — целая библиотека готовых стилей.
    Вместо того чтобы писать CSS вручную, ты пишешь короткие классы
    прямо в HTML (например class="text-xl"). Удобно для старта.
  -->
</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
  <!--
    <body> — всё, что РЕАЛЬНО видно на странице, находится тут.
    Разберём классы Tailwind на этом теге:
      bg-slate-100      — светло-серый фон
      min-h-screen      — высота минимум на весь экран
      flex              — включаем "флекс", чтобы управлять расположением
      items-center      — выравниваем по центру по вертикали
      justify-center    — выравниваем по центру по горизонтали
      p-4               — внутренний отступ (padding) со всех сторон
    Вместе: карточка окажется ровно по центру экрана.
  -->

  <!-- ===== КАРТОЧКА ПРОФИЛЯ ===== -->
  <div class="bg-white rounded-2xl shadow-lg max-w-sm w-full p-8 text-center">
    <!--
      Это и есть карточка. Классы:
        bg-white     — белый фон
        rounded-2xl  — сильно скруглённые углы
        shadow-lg    — большая мягкая тень (карточка "приподнята")
        max-w-sm     — максимальная ширина (не растягивается слишком сильно)
        w-full       — занять всю доступную ширину до этого максимума
        p-8          — внутренний отступ побольше
        text-center  — текст внутри по центру
    -->

    <!-- Аватар: кружок с буквой P -->
    <div class="w-20 h-20 mx-auto rounded-full bg-indigo-500 flex items-center justify-center text-white text-3xl font-bold">
      P
    </div>
    <!--
      w-20 h-20  — ширина и высота (квадрат)
      mx-auto    — центрируем по горизонтали (margin слева/справа авто)
      rounded-full — делаем из квадрата круг
      bg-indigo-500 — сине-фиолетовый цвет
      остальное — буква P белая, крупная и жирная, по центру
    -->

    <!-- Имя -->
    <h1 class="mt-4 text-2xl font-bold text-slate-800">Peter</h1>
    <!-- mt-4 — отступ сверху (margin-top), чтобы имя не липло к аватару. -->

    <!-- Должность -->
    <p class="text-indigo-500 font-medium">Design Engineer</p>

    <!-- Короткое описание -->
    <p class="mt-3 text-slate-500 text-sm leading-relaxed">
      I build interfaces somewhere between design and code —
      from a rough idea to something that actually works.
    </p>

    <!-- Кнопка -->
    <a href="mailto:peterharmash@gmail.com"
       class="inline-block mt-6 bg-indigo-500 hover:bg-indigo-600 text-white font-medium px-6 py-2 rounded-lg transition">
      Написать мне
    </a>
    <!--
      <a> — ссылка. href="mailto:..." откроет почтовый клиент.
      hover:bg-indigo-600 — цвет МЕНЯЕТСЯ при наведении мышкой.
      transition — делает смену цвета плавной, а не резкой.
      Наведи курсор на кнопку в браузере и увидишь эффект.
    -->
  </div>
  <!-- ===== КОНЕЦ КАРТОЧКИ ===== -->

</body>
</html>
